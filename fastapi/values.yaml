image:
  repository: atlasapiacr.azurecr.io/fastapi
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
  
serviceAccount:
  create: true
  name: "fastapi-service-account"

ingress:
  enabled: false
  # className: "nginx"
  # hosts:
  #   - host: atlasapi.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix

autoscaling:
  enabled: true